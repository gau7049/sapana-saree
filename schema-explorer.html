<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sapana Saree - Database Schema Explorer</title>
<style>
  :root {
    --bg: #0f172a;
    --surface: #1e293b;
    --surface2: #334155;
    --border: #475569;
    --text: #e2e8f0;
    --text-muted: #94a3b8;
    --accent: #818cf8;
    --accent2: #a78bfa;
    --pk: #fbbf24;
    --fk: #38bdf8;
    --idx: #34d399;
    --enum: #f472b6;
    --trigger: #fb923c;
    --check: #f87171;
    --unique: #c084fc;
    --green: #4ade80;
    --red: #f87171;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
  }

  header {
    background: linear-gradient(135deg, #312e81, #4c1d95);
    padding: 28px 40px;
    border-bottom: 1px solid var(--border);
  }

  header h1 {
    font-size: 26px;
    font-weight: 700;
    letter-spacing: -0.5px;
  }

  header p {
    color: var(--text-muted);
    margin-top: 4px;
    font-size: 14px;
  }

  .stats-bar {
    display: flex;
    gap: 24px;
    padding: 16px 40px;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    flex-wrap: wrap;
  }

  .stat {
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 13px;
    color: var(--text-muted);
  }

  .stat .num {
    font-size: 20px;
    font-weight: 700;
    color: var(--accent);
  }

  .controls {
    display: flex;
    gap: 12px;
    padding: 16px 40px;
    flex-wrap: wrap;
    align-items: center;
  }

  .controls input {
    background: var(--surface);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 8px 14px;
    border-radius: 8px;
    font-size: 14px;
    width: 280px;
    outline: none;
    transition: border-color 0.2s;
  }

  .controls input:focus { border-color: var(--accent); }

  .filter-btn {
    background: var(--surface);
    border: 1px solid var(--border);
    color: var(--text-muted);
    padding: 7px 14px;
    border-radius: 8px;
    cursor: pointer;
    font-size: 13px;
    transition: all 0.2s;
  }

  .filter-btn:hover, .filter-btn.active {
    background: var(--accent);
    color: #fff;
    border-color: var(--accent);
  }

  .layout-toggle {
    margin-left: auto;
    display: flex;
    gap: 4px;
    background: var(--surface);
    border-radius: 8px;
    padding: 3px;
    border: 1px solid var(--border);
  }

  .layout-toggle button {
    background: none;
    border: none;
    color: var(--text-muted);
    padding: 5px 12px;
    border-radius: 6px;
    cursor: pointer;
    font-size: 13px;
  }

  .layout-toggle button.active {
    background: var(--accent);
    color: #fff;
  }

  .container {
    padding: 20px 40px 60px;
  }

  /* Grid / List layout */
  .grid-layout {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(420px, 1fr));
    gap: 20px;
  }

  .list-layout {
    display: flex;
    flex-direction: column;
    gap: 20px;
    max-width: 900px;
  }

  /* Table card */
  .table-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    overflow: hidden;
    transition: transform 0.15s, box-shadow 0.15s;
  }

  .table-card:hover {
    transform: translateY(-2px);
    box-shadow: 0 8px 30px rgba(0,0,0,0.3);
  }

  .table-card.highlight {
    border-color: var(--accent);
    box-shadow: 0 0 0 2px rgba(129,140,248,0.3);
  }

  .table-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 14px 18px;
    background: var(--surface2);
    cursor: pointer;
    user-select: none;
  }

  .table-header h2 {
    font-size: 16px;
    font-weight: 600;
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .table-header h2 .icon { font-size: 18px; }

  .col-count {
    font-size: 12px;
    color: var(--text-muted);
    background: var(--bg);
    padding: 2px 8px;
    border-radius: 10px;
  }

  .table-body { padding: 0; }

  .column-row {
    display: grid;
    grid-template-columns: 180px 1fr auto;
    align-items: center;
    padding: 8px 18px;
    border-top: 1px solid rgba(71,85,105,0.4);
    font-size: 13px;
    gap: 10px;
    transition: background 0.15s;
  }

  .column-row:hover { background: rgba(129,140,248,0.06); }

  .col-name {
    font-family: 'Cascadia Code', 'Fira Code', monospace;
    font-weight: 500;
    display: flex;
    align-items: center;
    gap: 6px;
  }

  .col-type {
    font-family: 'Cascadia Code', 'Fira Code', monospace;
    font-size: 12px;
    color: var(--text-muted);
  }

  .badges { display: flex; gap: 4px; flex-wrap: wrap; justify-content: flex-end; }

  .badge {
    font-size: 10px;
    font-weight: 600;
    padding: 2px 7px;
    border-radius: 4px;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    white-space: nowrap;
  }

  .badge-pk { background: rgba(251,191,36,0.15); color: var(--pk); }
  .badge-fk { background: rgba(56,189,248,0.15); color: var(--fk); }
  .badge-not-null { background: rgba(248,113,113,0.1); color: var(--check); }
  .badge-unique { background: rgba(192,132,252,0.15); color: var(--unique); }
  .badge-default { background: rgba(52,211,153,0.1); color: var(--idx); }
  .badge-check { background: rgba(248,113,113,0.15); color: var(--check); }
  .badge-gen { background: rgba(244,114,182,0.15); color: var(--enum); }

  /* Sections within card */
  .card-section {
    border-top: 1px solid var(--border);
    padding: 10px 18px;
  }

  .card-section-title {
    font-size: 11px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 1px;
    color: var(--text-muted);
    margin-bottom: 6px;
  }

  .fk-link, .idx-item, .trigger-item {
    font-size: 12px;
    padding: 3px 0;
    color: var(--text-muted);
    font-family: 'Cascadia Code', 'Fira Code', monospace;
  }

  .fk-link span { color: var(--fk); cursor: pointer; }
  .fk-link span:hover { text-decoration: underline; }
  .idx-item span { color: var(--idx); }
  .trigger-item span { color: var(--trigger); }

  /* Enums section */
  .enums-section {
    padding: 20px 40px;
  }

  .enums-section h2 {
    font-size: 18px;
    margin-bottom: 14px;
    color: var(--text);
  }

  .enum-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
    gap: 14px;
  }

  .enum-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 14px 18px;
  }

  .enum-card h3 {
    font-size: 14px;
    font-family: 'Cascadia Code', 'Fira Code', monospace;
    color: var(--enum);
    margin-bottom: 8px;
  }

  .enum-values {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
  }

  .enum-val {
    background: rgba(244,114,182,0.1);
    color: var(--enum);
    padding: 3px 10px;
    border-radius: 6px;
    font-size: 12px;
    font-family: 'Cascadia Code', 'Fira Code', monospace;
  }

  /* Functions & Triggers summary */
  .func-section {
    padding: 20px 40px;
  }

  .func-section h2 {
    font-size: 18px;
    margin-bottom: 14px;
  }

  .func-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(360px, 1fr));
    gap: 14px;
  }

  .func-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 14px 18px;
  }

  .func-card h3 {
    font-size: 14px;
    font-family: 'Cascadia Code', 'Fira Code', monospace;
    color: var(--trigger);
    margin-bottom: 4px;
  }

  .func-card .desc {
    font-size: 12px;
    color: var(--text-muted);
    line-height: 1.5;
  }

  .func-card .tag {
    display: inline-block;
    font-size: 10px;
    padding: 2px 8px;
    border-radius: 4px;
    margin-top: 6px;
    text-transform: uppercase;
    font-weight: 600;
    letter-spacing: 0.5px;
  }

  .tag-definer { background: rgba(248,113,113,0.15); color: var(--check); }
  .tag-plpgsql { background: rgba(56,189,248,0.15); color: var(--fk); }
  .tag-sql { background: rgba(52,211,153,0.15); color: var(--idx); }

  /* Relationship diagram */
  .rel-section { padding: 20px 40px; }
  .rel-section h2 { font-size: 18px; margin-bottom: 14px; }

  .rel-table {
    width: 100%;
    border-collapse: collapse;
    background: var(--surface);
    border-radius: 10px;
    overflow: hidden;
  }

  .rel-table th {
    background: var(--surface2);
    padding: 10px 16px;
    text-align: left;
    font-size: 12px;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    color: var(--text-muted);
  }

  .rel-table td {
    padding: 8px 16px;
    font-size: 13px;
    border-top: 1px solid rgba(71,85,105,0.4);
    font-family: 'Cascadia Code', 'Fira Code', monospace;
  }

  .rel-arrow { color: var(--accent); font-size: 16px; }

  .rel-table .on-delete {
    font-size: 11px;
    padding: 2px 8px;
    border-radius: 4px;
    font-family: 'Cascadia Code', 'Fira Code', monospace;
  }

  .on-delete-cascade { background: rgba(248,113,113,0.15); color: var(--check); }
  .on-delete-setnull { background: rgba(251,191,36,0.15); color: var(--pk); }

  .hidden { display: none !important; }

  @media (max-width: 768px) {
    header, .stats-bar, .controls, .container, .enums-section, .func-section, .rel-section {
      padding-left: 16px;
      padding-right: 16px;
    }
    .grid-layout { grid-template-columns: 1fr; }
    .column-row { grid-template-columns: 130px 1fr auto; }
  }
</style>
</head>
<body>

<header>
  <h1>Sapana Saree &mdash; Database Schema</h1>
  <p>Interactive explorer for all tables, enums, relationships, indexes, triggers &amp; functions</p>
</header>

<div class="stats-bar" id="statsBar"></div>

<div class="controls">
  <input type="text" id="search" placeholder="Search tables or columns..." autocomplete="off" />
  <button class="filter-btn active" data-filter="all">All Tables</button>
  <button class="filter-btn" data-filter="auth">Auth</button>
  <button class="filter-btn" data-filter="catalog">Catalog</button>
  <button class="filter-btn" data-filter="engagement">Engagement</button>
  <button class="filter-btn" data-filter="admin">Admin</button>
  <div class="layout-toggle">
    <button class="active" data-layout="grid">Grid</button>
    <button data-layout="list">List</button>
  </div>
</div>

<div class="container">
  <div class="grid-layout" id="tableContainer"></div>
</div>

<div class="enums-section" id="enumSection"></div>
<div class="rel-section" id="relSection"></div>
<div class="func-section" id="funcSection"></div>

<script>
const schema = {
  enums: [
    { name: 'user_role', values: ['customer', 'admin', 'super_admin'] },
    { name: 'product_status', values: ['draft', 'published', 'archived'] },
    { name: 'review_status', values: ['pending', 'approved', 'rejected'] },
    { name: 'inquiry_status', values: ['sent', 'responded', 'completed', 'cancelled'] }
  ],
  tables: [
    {
      name: 'profiles',
      group: 'auth',
      icon: '\u{1F464}',
      desc: 'Extends Supabase auth.users',
      columns: [
        { name: 'id', type: 'UUID', pk: true, fk: 'auth.users(id)', onDelete: 'CASCADE', notNull: true },
        { name: 'email', type: 'TEXT', notNull: true },
        { name: 'full_name', type: 'TEXT' },
        { name: 'phone', type: 'TEXT' },
        { name: 'avatar_url', type: 'TEXT' },
        { name: 'role', type: 'user_role', notNull: true, default: "'customer'" },
        { name: 'created_at', type: 'TIMESTAMPTZ', notNull: true, default: 'now()' },
        { name: 'updated_at', type: 'TIMESTAMPTZ', notNull: true, default: 'now()' }
      ],
      indexes: ['idx_profiles_role (role)', 'idx_profiles_email (email)'],
      triggers: ['set_updated_at → update_updated_at()'],
      rls: true
    },
    {
      name: 'categories',
      group: 'catalog',
      icon: '\u{1F3F7}',
      desc: 'Product categories with self-referencing hierarchy',
      columns: [
        { name: 'id', type: 'UUID', pk: true, default: 'gen_random_uuid()' },
        { name: 'name', type: 'TEXT', notNull: true },
        { name: 'slug', type: 'TEXT', notNull: true, unique: true },
        { name: 'description', type: 'TEXT' },
        { name: 'image_url', type: 'TEXT' },
        { name: 'parent_id', type: 'UUID', fk: 'categories(id)', onDelete: 'SET NULL' },
        { name: 'sort_order', type: 'INT', default: '0' },
        { name: 'is_active', type: 'BOOLEAN', default: 'true' },
        { name: 'created_at', type: 'TIMESTAMPTZ', notNull: true, default: 'now()' },
        { name: 'updated_at', type: 'TIMESTAMPTZ', notNull: true, default: 'now()' }
      ],
      indexes: ['idx_categories_slug (slug)', 'idx_categories_parent (parent_id)'],
      triggers: ['set_updated_at → update_updated_at()'],
      rls: true
    },
    {
      name: 'products',
      group: 'catalog',
      icon: '\u{1F3AD}',
      desc: 'Saree products with full-text search',
      columns: [
        { name: 'id', type: 'UUID', pk: true, default: 'gen_random_uuid()' },
        { name: 'title', type: 'TEXT', notNull: true },
        { name: 'slug', type: 'TEXT', notNull: true, unique: true },
        { name: 'description', type: 'TEXT' },
        { name: 'short_description', type: 'TEXT' },
        { name: 'price', type: 'DECIMAL(10,2)', notNull: true, check: 'price >= 0' },
        { name: 'compare_at_price', type: 'DECIMAL(10,2)', check: 'NULL or >= 0' },
        { name: 'category_id', type: 'UUID', fk: 'categories(id)', onDelete: 'SET NULL' },
        { name: 'status', type: 'product_status', notNull: true, default: "'draft'" },
        { name: 'is_featured', type: 'BOOLEAN', default: 'false' },
        { name: 'material', type: 'TEXT' },
        { name: 'color', type: 'TEXT' },
        { name: 'occasion', type: 'TEXT' },
        { name: 'work_type', type: 'TEXT' },
        { name: 'avg_rating', type: 'DECIMAL(2,1)', default: '0' },
        { name: 'review_count', type: 'INT', default: '0' },
        { name: 'view_count', type: 'INT', default: '0' },
        { name: 'meta_title', type: 'TEXT' },
        { name: 'meta_description', type: 'TEXT' },
        { name: 'search_vector', type: 'TSVECTOR', generated: 'title + description + material + occasion + work_type' },
        { name: 'created_at', type: 'TIMESTAMPTZ', notNull: true, default: 'now()' },
        { name: 'updated_at', type: 'TIMESTAMPTZ', notNull: true, default: 'now()' }
      ],
      indexes: [
        'idx_products_slug (slug)',
        'idx_products_category (category_id)',
        'idx_products_status_category (status, category_id)',
        'idx_products_status_price (status, price)',
        'idx_products_status_created (status, created_at DESC)',
        'idx_products_price (price)',
        'idx_products_featured (is_featured) WHERE true',
        'idx_products_created (created_at DESC)',
        'idx_products_search GIN (search_vector)'
      ],
      triggers: ['set_updated_at → update_updated_at()'],
      rls: true
    },
    {
      name: 'product_images',
      group: 'catalog',
      icon: '\u{1F5BC}',
      desc: 'Cloudinary-hosted product images',
      columns: [
        { name: 'id', type: 'UUID', pk: true, default: 'gen_random_uuid()' },
        { name: 'product_id', type: 'UUID', notNull: true, fk: 'products(id)', onDelete: 'CASCADE' },
        { name: 'url', type: 'TEXT', notNull: true },
        { name: 'public_id', type: 'TEXT', notNull: true },
        { name: 'alt_text', type: 'TEXT' },
        { name: 'sort_order', type: 'INT', default: '0' },
        { name: 'is_primary', type: 'BOOLEAN', default: 'false' },
        { name: 'width', type: 'INT' },
        { name: 'height', type: 'INT' },
        { name: 'created_at', type: 'TIMESTAMPTZ', notNull: true, default: 'now()' }
      ],
      indexes: ['idx_product_images_product (product_id)'],
      triggers: [],
      rls: true
    },
    {
      name: 'reviews',
      group: 'engagement',
      icon: '\u{2B50}',
      desc: 'Product reviews with moderation',
      columns: [
        { name: 'id', type: 'UUID', pk: true, default: 'gen_random_uuid()' },
        { name: 'product_id', type: 'UUID', notNull: true, fk: 'products(id)', onDelete: 'CASCADE' },
        { name: 'user_id', type: 'UUID', notNull: true, fk: 'profiles(id)', onDelete: 'CASCADE' },
        { name: 'rating', type: 'INT', notNull: true, check: '1 ≤ rating ≤ 5' },
        { name: 'title', type: 'TEXT' },
        { name: 'comment', type: 'TEXT' },
        { name: 'status', type: 'review_status', notNull: true, default: "'pending'" },
        { name: 'admin_response', type: 'TEXT' },
        { name: 'created_at', type: 'TIMESTAMPTZ', notNull: true, default: 'now()' },
        { name: 'updated_at', type: 'TIMESTAMPTZ', notNull: true, default: 'now()' }
      ],
      compositeUnique: ['(product_id, user_id)'],
      indexes: [
        'idx_reviews_product (product_id)',
        'idx_reviews_user (user_id)',
        'idx_reviews_product_status (product_id, status)'
      ],
      triggers: [
        'set_updated_at → update_updated_at()',
        'on_review_change → update_product_rating()'
      ],
      rls: true
    },
    {
      name: 'inquiries',
      group: 'engagement',
      icon: '\u{1F4F1}',
      desc: 'WhatsApp purchase inquiries',
      columns: [
        { name: 'id', type: 'UUID', pk: true, default: 'gen_random_uuid()' },
        { name: 'user_id', type: 'UUID', notNull: true, fk: 'profiles(id)', onDelete: 'CASCADE' },
        { name: 'product_id', type: 'UUID', notNull: true, fk: 'products(id)', onDelete: 'CASCADE' },
        { name: 'status', type: 'inquiry_status', notNull: true, default: "'sent'" },
        { name: 'whatsapp_message', type: 'TEXT', notNull: true },
        { name: 'notes', type: 'TEXT' },
        { name: 'created_at', type: 'TIMESTAMPTZ', notNull: true, default: 'now()' },
        { name: 'updated_at', type: 'TIMESTAMPTZ', notNull: true, default: 'now()' }
      ],
      indexes: [
        'idx_inquiries_user (user_id)',
        'idx_inquiries_product (product_id)',
        'idx_inquiries_status (status)',
        'idx_inquiries_created (created_at DESC)'
      ],
      triggers: ['set_updated_at → update_updated_at()'],
      rls: true
    },
    {
      name: 'wishlists',
      group: 'engagement',
      icon: '\u{2764}',
      desc: 'User product wishlists',
      columns: [
        { name: 'id', type: 'UUID', pk: true, default: 'gen_random_uuid()' },
        { name: 'user_id', type: 'UUID', notNull: true, fk: 'profiles(id)', onDelete: 'CASCADE' },
        { name: 'product_id', type: 'UUID', notNull: true, fk: 'products(id)', onDelete: 'CASCADE' },
        { name: 'created_at', type: 'TIMESTAMPTZ', notNull: true, default: 'now()' }
      ],
      compositeUnique: ['(user_id, product_id)'],
      indexes: [
        'idx_wishlists_user (user_id)',
        'idx_wishlists_product (product_id)'
      ],
      triggers: [],
      rls: true
    },
    {
      name: 'contact_messages',
      group: 'admin',
      icon: '\u{1F4E9}',
      desc: 'Contact form submissions',
      columns: [
        { name: 'id', type: 'UUID', pk: true, default: 'gen_random_uuid()' },
        { name: 'name', type: 'TEXT', notNull: true },
        { name: 'email', type: 'TEXT', notNull: true },
        { name: 'subject', type: 'TEXT' },
        { name: 'message', type: 'TEXT', notNull: true },
        { name: 'is_read', type: 'BOOLEAN', default: 'false' },
        { name: 'created_at', type: 'TIMESTAMPTZ', notNull: true, default: 'now()' }
      ],
      indexes: ['idx_contact_messages_read (is_read) WHERE false'],
      triggers: [],
      rls: true
    },
    {
      name: 'site_settings',
      group: 'admin',
      icon: '\u{2699}',
      desc: 'Key-value site configuration',
      columns: [
        { name: 'key', type: 'TEXT', pk: true },
        { name: 'value', type: 'JSONB', notNull: true },
        { name: 'updated_at', type: 'TIMESTAMPTZ', notNull: true, default: 'now()' }
      ],
      indexes: [],
      triggers: [],
      rls: true
    }
  ],
  functions: [
    { name: 'is_admin()', lang: 'sql', security: 'DEFINER', desc: 'Returns true if current user has admin or super_admin role. Used by RLS policies. search_path hardened.' },
    { name: 'update_updated_at()', lang: 'plpgsql', security: null, desc: 'Auto-sets updated_at = now() before UPDATE on profiles, categories, products, reviews, inquiries.' },
    { name: 'handle_new_user()', lang: 'plpgsql', security: 'DEFINER', desc: 'Trigger on auth.users INSERT: auto-creates a profiles row with email and full_name from user metadata.' },
    { name: 'update_product_rating()', lang: 'plpgsql', security: 'DEFINER', desc: 'After review INSERT/UPDATE/DELETE: recalculates avg_rating and review_count on the parent product. Skips if no relevant fields changed.' }
  ],
  relationships: [
    { from: 'profiles.id', to: 'auth.users(id)', onDelete: 'CASCADE' },
    { from: 'categories.parent_id', to: 'categories(id)', onDelete: 'SET NULL' },
    { from: 'products.category_id', to: 'categories(id)', onDelete: 'SET NULL' },
    { from: 'product_images.product_id', to: 'products(id)', onDelete: 'CASCADE' },
    { from: 'reviews.product_id', to: 'products(id)', onDelete: 'CASCADE' },
    { from: 'reviews.user_id', to: 'profiles(id)', onDelete: 'CASCADE' },
    { from: 'inquiries.user_id', to: 'profiles(id)', onDelete: 'CASCADE' },
    { from: 'inquiries.product_id', to: 'products(id)', onDelete: 'CASCADE' },
    { from: 'wishlists.user_id', to: 'profiles(id)', onDelete: 'CASCADE' },
    { from: 'wishlists.product_id', to: 'products(id)', onDelete: 'CASCADE' }
  ]
};

// Render stats
const statsBar = document.getElementById('statsBar');
const totalCols = schema.tables.reduce((s, t) => s + t.columns.length, 0);
const totalIdx = schema.tables.reduce((s, t) => s + t.indexes.length, 0);
statsBar.innerHTML = `
  <div class="stat"><span class="num">${schema.tables.length}</span> Tables</div>
  <div class="stat"><span class="num">${totalCols}</span> Columns</div>
  <div class="stat"><span class="num">${schema.relationships.length}</span> Foreign Keys</div>
  <div class="stat"><span class="num">${totalIdx}</span> Indexes</div>
  <div class="stat"><span class="num">${schema.enums.length}</span> Enums</div>
  <div class="stat"><span class="num">${schema.functions.length}</span> Functions</div>
`;

// Render tables
function renderTables(filter, search) {
  const container = document.getElementById('tableContainer');
  container.innerHTML = '';

  schema.tables.forEach(table => {
    if (filter !== 'all' && table.group !== filter) return;

    const matchesSearch = !search || table.name.includes(search) ||
      table.columns.some(c => c.name.includes(search) || c.type.toLowerCase().includes(search));
    if (!matchesSearch) return;

    const card = document.createElement('div');
    card.className = 'table-card';
    card.dataset.table = table.name;

    if (search && table.name.includes(search)) card.classList.add('highlight');

    let columnsHtml = table.columns.map(col => {
      const badges = [];
      if (col.pk) badges.push('<span class="badge badge-pk">PK</span>');
      if (col.fk) badges.push(`<span class="badge badge-fk">FK</span>`);
      if (col.notNull && !col.pk) badges.push('<span class="badge badge-not-null">NOT NULL</span>');
      if (col.unique) badges.push('<span class="badge badge-unique">UNIQUE</span>');
      if (col.default) badges.push(`<span class="badge badge-default">${col.default}</span>`);
      if (col.check) badges.push(`<span class="badge badge-check">✓ ${col.check}</span>`);
      if (col.generated) badges.push(`<span class="badge badge-gen">GENERATED</span>`);

      const isEnum = schema.enums.some(e => e.name === col.type);
      const typeClass = isEnum ? `style="color:var(--enum)"` : '';

      const highlighted = search && col.name.includes(search) ? 'style="background:rgba(129,140,248,0.1)"' : '';

      return `<div class="column-row" ${highlighted}>
        <div class="col-name">${col.name}</div>
        <div class="col-type" ${typeClass}>${col.type}</div>
        <div class="badges">${badges.join('')}</div>
      </div>`;
    }).join('');

    let sectionsHtml = '';

    // Composite unique
    if (table.compositeUnique && table.compositeUnique.length) {
      sectionsHtml += `<div class="card-section">
        <div class="card-section-title">Unique Constraints</div>
        ${table.compositeUnique.map(u => `<div class="idx-item"><span>UNIQUE</span> ${u}</div>`).join('')}
      </div>`;
    }

    // Foreign keys
    const fks = table.columns.filter(c => c.fk);
    if (fks.length) {
      sectionsHtml += `<div class="card-section">
        <div class="card-section-title">Foreign Keys</div>
        ${fks.map(c => {
          const targetTable = c.fk.split('(')[0];
          return `<div class="fk-link">${c.name} → <span onclick="scrollToTable('${targetTable}')">${c.fk}</span>
            <span class="on-delete ${c.onDelete === 'CASCADE' ? 'on-delete-cascade' : 'on-delete-setnull'}">${c.onDelete}</span>
          </div>`;
        }).join('')}
      </div>`;
    }

    // Indexes
    if (table.indexes.length) {
      sectionsHtml += `<div class="card-section">
        <div class="card-section-title">Indexes (${table.indexes.length})</div>
        ${table.indexes.map(i => `<div class="idx-item"><span>\u{26A1}</span> ${i}</div>`).join('')}
      </div>`;
    }

    // Triggers
    if (table.triggers.length) {
      sectionsHtml += `<div class="card-section">
        <div class="card-section-title">Triggers</div>
        ${table.triggers.map(t => `<div class="trigger-item"><span>\u{1F50C}</span> ${t}</div>`).join('')}
      </div>`;
    }

    card.innerHTML = `
      <div class="table-header" onclick="this.parentElement.querySelector('.table-body').classList.toggle('hidden')">
        <h2><span class="icon">${table.icon}</span> ${table.name}</h2>
        <span class="col-count">${table.columns.length} cols</span>
      </div>
      <div class="table-body">
        ${columnsHtml}
        ${sectionsHtml}
      </div>`;

    container.appendChild(card);
  });
}

// Render enums
function renderEnums() {
  const section = document.getElementById('enumSection');
  section.innerHTML = `<h2>Enum Types</h2><div class="enum-grid">
    ${schema.enums.map(e => `<div class="enum-card">
      <h3>${e.name}</h3>
      <div class="enum-values">${e.values.map(v => `<span class="enum-val">${v}</span>`).join('')}</div>
    </div>`).join('')}
  </div>`;
}

// Render relationships table
function renderRelationships() {
  const section = document.getElementById('relSection');
  section.innerHTML = `<h2>All Foreign Key Relationships</h2>
  <table class="rel-table">
    <thead><tr><th>Source</th><th></th><th>Target</th><th>On Delete</th></tr></thead>
    <tbody>
      ${schema.relationships.map(r => `<tr>
        <td>${r.from}</td>
        <td class="rel-arrow">→</td>
        <td>${r.to}</td>
        <td><span class="on-delete ${r.onDelete === 'CASCADE' ? 'on-delete-cascade' : 'on-delete-setnull'}">${r.onDelete}</span></td>
      </tr>`).join('')}
    </tbody>
  </table>`;
}

// Render functions
function renderFunctions() {
  const section = document.getElementById('funcSection');
  section.innerHTML = `<h2>Functions &amp; Triggers</h2><div class="func-grid">
    ${schema.functions.map(f => `<div class="func-card">
      <h3>${f.name}</h3>
      <div class="desc">${f.desc}</div>
      <span class="tag ${f.lang === 'sql' ? 'tag-sql' : 'tag-plpgsql'}">${f.lang}</span>
      ${f.security ? `<span class="tag tag-definer">SECURITY ${f.security}</span>` : ''}
    </div>`).join('')}
  </div>`;
}

function scrollToTable(name) {
  const card = document.querySelector(`.table-card[data-table="${name}"]`);
  if (card) {
    card.scrollIntoView({ behavior: 'smooth', block: 'center' });
    card.classList.add('highlight');
    setTimeout(() => card.classList.remove('highlight'), 2000);
  }
}

// Event listeners
let currentFilter = 'all';
document.querySelectorAll('.filter-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    currentFilter = btn.dataset.filter;
    renderTables(currentFilter, document.getElementById('search').value.toLowerCase());
  });
});

document.getElementById('search').addEventListener('input', e => {
  renderTables(currentFilter, e.target.value.toLowerCase());
});

document.querySelectorAll('.layout-toggle button').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.layout-toggle button').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    const container = document.getElementById('tableContainer');
    container.className = btn.dataset.layout === 'grid' ? 'grid-layout' : 'list-layout';
  });
});

// Initial render
renderTables('all', '');
renderEnums();
renderRelationships();
renderFunctions();
</script>
</body>
</html>
